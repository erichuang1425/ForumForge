<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>ForumForge</title>
    <style>
      :root {
        color-scheme: light dark;
      }
      body {
        font: 14px/1.5 system-ui, sans-serif;
        margin: 0;
        padding: 12px;
      }
      .ff-bar {
        display: flex;
        align-items: center;
        gap: 8px;
        margin-bottom: 8px;
      }
      .ff-app {
        font-size: 15px;
        margin: 0;
        flex: 1;
      }
      #ff-extract {
        font: inherit;
        padding: 6px 10px;
        cursor: pointer;
      }
      #ff-status {
        color: #777;
        margin: 8px 0 12px;
      }
      .ff-thread__title {
        font-size: 16px;
        margin: 0 0 8px;
      }
      .ff-posts {
        list-style: none;
        margin: 0;
        padding: 0;
      }
      .ff-post {
        padding: 10px 0;
        border-top: 1px solid #8883;
      }
      /* OP highlighting: posts by an important voice stand out for the whole
         thread, with a colored edge and a faint tint (not color alone — the
         badge text carries the same signal). */
      .ff-post[data-role="op"],
      .ff-post[data-role="mod"],
      .ff-post[data-role="admin"] {
        border-left: 3px solid #8884;
        padding-left: 10px;
      }
      .ff-post[data-role="op"] {
        border-left-color: #2563eb;
        background: #2563eb14;
      }
      .ff-post[data-role="mod"] {
        border-left-color: #16a34a;
        background: #16a34a14;
      }
      .ff-post[data-role="admin"] {
        border-left-color: #9333ea;
        background: #9333ea14;
      }
      .ff-post__meta {
        display: flex;
        gap: 8px;
        align-items: baseline;
        margin-bottom: 4px;
      }
      .ff-post__author {
        font-weight: 600;
      }
      .ff-post__role {
        font-size: 11px;
        letter-spacing: 0.04em;
        padding: 1px 6px;
        border-radius: 999px;
        background: #8882;
      }
      .ff-post[data-role="op"] .ff-post__role {
        background: #2563eb;
        color: #fff;
      }
      .ff-post[data-role="mod"] .ff-post__role {
        /* Darker green than the edge so white badge text clears WCAG AA
           contrast (~5:1) — the badge text is the non-color role signal. */
        background: #15803d;
        color: #fff;
      }
      .ff-post[data-role="admin"] .ff-post__role {
        background: #9333ea;
        color: #fff;
      }
      .ff-post__time {
        color: #888;
        font-size: 12px;
        margin-left: auto;
      }
      .ff-post__body {
        margin: 0;
        overflow-wrap: anywhere;
      }
      /* Plain-text fallback keeps the original line breaks. */
      .ff-post__text {
        margin: 0;
        white-space: pre-wrap;
      }
      .ff-post__body p {
        margin: 0 0 8px;
      }
      .ff-post__body > :last-child {
        margin-bottom: 0;
      }
      .ff-post__body a {
        color: #2563eb;
      }
      .ff-post__body blockquote {
        margin: 8px 0;
        padding: 0 0 0 10px;
        border-left: 3px solid #8884;
        color: #555;
      }
      .ff-post__body pre {
        margin: 8px 0;
        padding: 8px;
        background: #8881;
        border-radius: 4px;
        overflow-x: auto;
      }
      .ff-post__body code {
        font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
        font-size: 0.92em;
      }
      .ff-post__body ul,
      .ff-post__body ol {
        margin: 8px 0;
        padding-left: 22px;
      }
    </style>
  </head>
  <body>
    <header class="ff-bar">
      <h1 class="ff-app">ForumForge</h1>
      <button id="ff-extract" type="button">Read this thread</button>
    </header>
    <p id="ff-status">Open a forum thread, then “Read this thread”.</p>
    <div id="ff-output"></div>
    <script src="sidepanel.js"></script>
  </body>
</html>
